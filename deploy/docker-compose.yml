services:
  app:
    image: ghcr.io/bxota/tic-tac-toe:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ADDR=:8080
      - WEB_DIR=/app/web
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-tictactoe.bxota.com}
      - DB_PATH=/data/tictactoe.db
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URL=${DISCORD_REDIRECT_URL}
    volumes:
      - /opt/tictactoe/data:/data
    networks:
      caddy_net:
        aliases:
          - tictactoe_app

networks:
  caddy_net:
    name: caddy_net
    external: true
